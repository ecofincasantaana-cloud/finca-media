backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "configuracion"
    label: "Configuración del sitio"
    files:
      - name: "general"
        label: "Información general"
        file: "index.html"
        fields:
          - {label: "Título del sitio", name: "title", widget: "string"}
          - {label: "Descripción", name: "description", widget: "text"}
          - {label: "Teléfono WhatsApp", name: "whatsapp", widget: "string"}
